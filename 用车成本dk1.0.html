<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>养车成本计算器 | 对比打车和公共交通</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           金融科技风格 - 设计系统
           主色: #12122B (深紫蓝背景)
           辅助: #1A1A3D (渐变过渡)
           卡片: rgba(30, 30, 66, 0.85) 半透明深色
           强调: #00D4FF → #7A20FF (霓虹青蓝到紫渐变)
           文字: #FFFFFF (主标题) / #B0B0D8 (次要信息)
           圆角: 12-16px
           阴影: 0 8px 24px rgba(0, 0, 0, 0.3)
           ============================================ */

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #12122B;
            color: #FFFFFF;
            padding: 20px;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 50% 0%, #1A1A3D 0%, #12122B 60%);
        }

        /* 容器 */
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(30, 30, 66, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* 标题 */
        h1 {
            font-size: 1.8rem;
            margin-bottom: 6px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF 0%, #B0B0D8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #B0B0D8;
            margin-bottom: 24px;
            font-size: 0.95rem;
            font-weight: 400;
        }

        /* 卡片 - 毛玻璃效果 */
        .card {
            background: rgba(30, 30, 66, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        /* 表单组 */
        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #B0B0D8;
        }

        /* 输入框 - 深色主题 */
        select, input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 1rem;
            background: rgba(18, 18, 43, 0.6);
            color: #FFFFFF;
            transition: all 0.2s ease;
            outline: none;
            font-family: inherit;
        }

        select:focus, input[type="number"]:focus {
            border-color: #00D4FF;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15), 0 0 12px rgba(0, 212, 255, 0.2);
        }

        select option {
            background: #1A1A3D;
            color: #FFFFFF;
        }

        /* 行布局 */
        .row { display: flex; gap: 12px; }
        .row > div { flex: 1; }

        /* 主按钮 - 霓虹渐变 */
        .btn {
            background: linear-gradient(135deg, #00D4FF 0%, #7A20FF 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0, 212, 255, 0.3), 0 0 12px rgba(0, 212, 255, 0.2);
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 212, 255, 0.4), 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: translateY(0);
        }

        /* 次要按钮（绿色变霓虹） */
        .btn-secondary {
            background: linear-gradient(135deg, #00D4FF 0%, #7A20FF 100%);
            box-shadow: 0 4px 16px rgba(0, 212, 255, 0.3);
        }

        /* 结果区域 */
        .result { display: none; margin-top: 24px; }

        .result-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #FFFFFF;
        }

        /* 对比卡片 */
        .compare-cards { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }

        .compare-card {
            flex: 1;
            min-width: 130px;
            background: rgba(30, 30, 66, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .compare-card:hover {
            background: rgba(40, 40, 80, 0.9);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .compare-card.active {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 16px rgba(0, 212, 255, 0.2), 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .cost-number {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00D4FF 0%, #7A20FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .cost-label {
            font-size: 0.85rem;
            color: #B0B0D8;
            margin-top: 4px;
        }

        .per-day {
            font-size: 1rem;
            color: #FFFFFF;
            margin-top: 6px;
            font-weight: 500;
        }

        /* 明细列表 */
        .breakdown {
            background: rgba(30, 30, 66, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
            font-size: 0.95rem;
            color: #B0B0D8;
        }

        .breakdown-item:last-child { border-bottom: none; }

        .breakdown-item span:last-child {
            color: #FFFFFF;
            font-weight: 600;
        }

        /* 警示信息 - 霓虹黄 */
        .shock-text {
            background: rgba(255, 193, 7, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 14px;
            margin-top: 16px;
            font-weight: 500;
            color: #FFC107;
            line-height: 1.6;
            border: 1px solid rgba(255, 193, 7, 0.2);
            box-shadow: 0 4px 16px rgba(255, 193, 7, 0.1);
        }

        /* 广告位 */
        .ad-placeholder {
            background: rgba(30, 30, 66, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px dashed rgba(0, 212, 255, 0.3);
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            margin: 24px 0;
            color: #B0B0D8;
            font-size: 0.9rem;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        /* 备注 */
        .note {
            font-size: 0.8rem;
            color: #6B6B8D;
            margin-top: 12px;
        }

        /* 分享文案区域 */
        #shareText {
            margin-top: 12px;
            font-size: 0.9rem;
            background: rgba(18, 18, 43, 0.8);
            padding: 10px;
            border-radius: 10px;
            display: none;
            color: #B0B0D8;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* 淡入上浮动画 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result.animate { animation: fadeInUp 0.4s ease-out; }

        /* 霓虹光晕装饰 */
        .glow-accent {
            position: relative;
        }

        .glow-accent::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, #00D4FF, #7A20FF, #00D4FF);
            border-radius: inherit;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
            filter: blur(8px);
        }

        .glow-accent:hover::after {
            opacity: 0.5;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #12122B;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.5);
        }

        @media (max-width: 500px) {
            .row { flex-direction: column; }
            .compare-cards { flex-direction: column; }
            body { padding: 12px; }
            .container { padding: 16px; border-radius: 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🚗 养车成本计算器</h1>
    <p class="subtitle">选车型、填通勤，看看养车 vs 打车 vs 公交哪个更香</p>

    <div class="card">
        <div class="form-group">
            <label>动力类型</label>
            <select id="fuelType">
                <option value="gas">纯油车</option>
                <option value="hybrid">混动 (插混/增程)</option>
                <option value="ev">纯电车</option>
            </select>
        </div>
        <div class="row">
            <div class="form-group">
                <label>车价级别</label>
                <select id="priceLevel">
                    <option value="under10">10万以下</option>
                    <option value="10to20" selected>10-20万</option>
                    <option value="20to30">20-30万</option>
                    <option value="above30">30万以上</option>
                </select>
            </div>
            <div class="form-group">
                <label>车辆类型</label>
                <select id="carType">
                    <option value="sedan" selected>轿车</option>
                    <option value="suv">SUV / MPV</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="row">
            <div class="form-group">
                <label>日均通勤距离 (往返) 公里</label>
                <input type="number" id="commuteKm" placeholder="例如 30" value="30" step="1" min="0">
            </div>
            <div class="form-group">
                <label>每月额外用车里程 (公里)</label>
                <input type="number" id="extraKm" placeholder="周末出游等，默认200" value="200" step="10" min="0">
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label>所在城市级别</label>
                <select id="cityLevel">
                    <option value="first">一线 (北上广深)</option>
                    <option value="newFirst" selected>新一线 (杭州/成都等)</option>
                    <option value="other">二三线及以下</option>
                </select>
            </div>
            <div class="form-group">
                <label>停车情况</label>
                <select id="parkingType">
                    <option value="free">自有车位 (仅管理费)</option>
                    <option value="rent" selected>租车位/月卡</option>
                    <option value="street">路边/打游击</option>
                </select>
            </div>
        </div>
        <button class="btn" onclick="calculate()">计算养车成本 & 对比</button>
        <p class="note">* 油价按8.2元/L、电价按0.6元/度(家充)/1.5元/度(快充)估算，可在代码中调整</p>
    </div>

    <!-- 广告位1：表单下方 -->
    <div class="ad-placeholder">
        📢 广告位 #1 (表单下方) - 可放置汽车保险/新能源推广广告
    </div>

    <div id="resultSection" class="result">
        <h2 class="result-title">📊 年度出行成本对比</h2>
        <div class="compare-cards">
            <div class="compare-card active" id="carCard" onclick="switchDetail('car')">
                <div class="cost-number" id="carCost">¥ --</div>
                <div class="cost-label">养车年成本</div>
                <div class="per-day" id="carPerDay"></div>
            </div>
            <div class="compare-card" id="taxiCard" onclick="switchDetail('taxi')">
                <div class="cost-number" id="taxiCost">¥ --</div>
                <div class="cost-label">打车年成本</div>
                <div class="per-day" id="taxiPerDay"></div>
            </div>
            <div class="compare-card" id="busCard" onclick="switchDetail('bus')">
                <div class="cost-number" id="busCost">¥ --</div>
                <div class="cost-label">公交/地铁年成本</div>
                <div class="per-day" id="busPerDay"></div>
            </div>
        </div>

        <!-- 详细成本（根据点击切换） -->
        <div class="breakdown">
            <h4 id="breakdownTitle" style="margin-bottom: 10px; color: #FFFFFF; font-weight: 600;">🔧 养车成本明细</h4>
            <div id="breakdownContent"></div>
        </div>

        <div class="shock-text" id="shockMessage"></div>

        <!-- 广告位2：结果区域中部，高意向转化 -->
        <div class="ad-placeholder" style="margin-top: 20px;">
            📢 广告位 #2 (结果页中部) - 可放置打车券/租车平台/二手车置换广告
        </div>

        <button class="btn btn-secondary" style="margin-top:16px;" onclick="generateShareText()">📸 生成分享文案 (截图分享)</button>
        <div id="shareText"></div>
    </div>
</div>

<script>
    (function() {
        // ==================== 系数表（可随时调整） ====================
        const coefficients = {
            insurance: {
                under10: { gas: 3200, hybrid: 3500, ev: 3600 },
                '10to20': { gas: 4000, hybrid: 4500, ev: 4800 },
                '20to30': { gas: 5500, hybrid: 6000, ev: 6500 },
                above30: { gas: 8000, hybrid: 8500, ev: 9000 }
            },
            maintenance: {
                gas: { sedan: 1800, suv: 2100 },
                hybrid: { sedan: 1200, suv: 1400 },
                ev: { sedan: 400, suv: 500 }
            },
            consumption: {
                gas: { sedan: 7.5, suv: 9.5 },
                hybrid: { sedan: 4.5, suv: 6.0 },
                ev: { sedan: 13.0, suv: 17.0 }
            },
            depreciationRate: { under10: 0.12, '10to20': 0.13, '20to30': 0.14, above30: 0.15 },
            fuelPrice: 8.2,
            electricityPriceHome: 0.6,
            electricityPricePublic: 1.5,
            homeChargeRatio: 0.7,
            parkingMonthly: {
                first: { free: 80, rent: 600, street: 300 },
                newFirst: { free: 60, rent: 400, street: 200 },
                other: { free: 40, rent: 250, street: 100 }
            },
            miscellaneous: 2000,
            taxiPerKm: { first: 2.8, newFirst: 2.2, other: 1.8 },
            transitMonthly: { first: 350, newFirst: 250, other: 150 }
        };

        // 存储计算结果用于切换明细
        let lastCalcResult = null;

        window.calculate = function() {
            try {
                const fuelType = document.getElementById('fuelType').value;
                const priceLevel = document.getElementById('priceLevel').value;
                const carType = document.getElementById('carType').value;
                const commuteKm = parseFloat(document.getElementById('commuteKm').value) || 0;
                const extraKm = parseFloat(document.getElementById('extraKm').value) || 0;
                const cityLevel = document.getElementById('cityLevel').value;
                const parkingType = document.getElementById('parkingType').value;

                // 年总里程
                const commuteYearKm = commuteKm * 261;
                const extraYearKm = extraKm * 12;
                const totalYearKm = commuteYearKm + extraYearKm;

                // 固定成本
                const ins = coefficients.insurance[priceLevel][fuelType];
                const maint = coefficients.maintenance[fuelType][carType];
                const priceMid = { under10: 70000, '10to20': 150000, '20to30': 250000, above30: 350000 }[priceLevel];
                const depRate = coefficients.depreciationRate[priceLevel];
                const depreciation = priceMid * depRate;

                // 能耗
                const cons = coefficients.consumption[fuelType][carType];
                let energyCost = 0;
                if (fuelType === 'ev') {
                    const homeRatio = coefficients.homeChargeRatio;
                    const kwhTotal = (totalYearKm / 100) * cons;
                    const homeCost = kwhTotal * homeRatio * coefficients.electricityPriceHome;
                    const publicCost = kwhTotal * (1 - homeRatio) * coefficients.electricityPricePublic;
                    energyCost = homeCost + publicCost;
                } else {
                    const fuelTotal = (totalYearKm / 100) * cons;
                    energyCost = fuelTotal * coefficients.fuelPrice;
                }

                const parkMonthly = coefficients.parkingMonthly[cityLevel][parkingType];
                const parkingYear = parkMonthly * 12;
                const misc = coefficients.miscellaneous;
                const totalCarCost = ins + maint + depreciation + energyCost + parkingYear + misc;
                const carPerDay = totalCarCost / 365;

                const taxiRate = coefficients.taxiPerKm[cityLevel];
                const taxiYearCost = totalYearKm * taxiRate;
                const taxiPerDay = taxiYearCost / 365;

                const transitMonthlyCost = coefficients.transitMonthly[cityLevel];
                const transitYearCost = transitMonthlyCost * 12;
                const transitPerDay = transitYearCost / 365;

                // 更新对比卡片数字
                document.getElementById('carCost').innerText = '¥ ' + totalCarCost.toFixed(0);
                document.getElementById('carPerDay').innerText = '日均 ' + carPerDay.toFixed(0) + ' 元';
                document.getElementById('taxiCost').innerText = '¥ ' + taxiYearCost.toFixed(0);
                document.getElementById('taxiPerDay').innerText = '日均 ' + taxiPerDay.toFixed(0) + ' 元';
                document.getElementById('busCost').innerText = '¥ ' + transitYearCost.toFixed(0);
                document.getElementById('busPerDay').innerText = '日均 ' + transitPerDay.toFixed(0) + ' 元';

                // 冲击结论
                const diff = totalCarCost - taxiYearCost;
                let shock = '';
                if (diff > 5000) {
                    shock = `🚨 养车比打车贵 <strong>¥${diff.toFixed(0)}</strong>/年！这钱够每年多一次出国旅行。`;
                } else if (diff > 0) {
                    shock = `⚠️ 养车略贵于打车，但换来便利性。节省约 ¥${diff.toFixed(0)}/年可小升级下数码装备。`;
                } else {
                    shock = `✅ 你这种用车强度，养车比打车还省 ¥${Math.abs(diff).toFixed(0)}/年，性价比不错。`;
                }
                shock += `<br>📌 每天养车成本 <strong>¥${carPerDay.toFixed(0)}</strong>，相当于少喝 <strong>${(carPerDay / 15).toFixed(0)}</strong> 杯奶茶。`;
                document.getElementById('shockMessage').innerHTML = shock;

                // 保存计算结果
                lastCalcResult = {
                    ins, maint, depreciation, energyCost, parkingYear, misc, totalCarCost, carPerDay,
                    taxiRate, totalYearKm, taxiYearCost, taxiPerDay,
                    transitMonthlyCost, transitYearCost, transitPerDay,
                    cityLevel
                };

                // 默认显示养车明细
                showCarDetail();

                // 显示结果区并触发动画
                const resultSection = document.getElementById('resultSection');
                resultSection.classList.remove('animate');
                resultSection.style.display = 'block';
                void resultSection.offsetWidth;
                resultSection.classList.add('animate');

                document.getElementById('shareText').style.display = 'none';
            } catch (error) {
                alert('计算出错：' + error.message);
                console.error(error);
            }
        };

        // 切换明细
        window.switchDetail = function(type) {
            // 切换卡片激活样式
            document.getElementById('carCard').classList.remove('active');
            document.getElementById('taxiCard').classList.remove('active');
            document.getElementById('busCard').classList.remove('active');

            if (type === 'car') {
                document.getElementById('carCard').classList.add('active');
                showCarDetail();
            } else if (type === 'taxi') {
                document.getElementById('taxiCard').classList.add('active');
                showTaxiDetail();
            } else if (type === 'bus') {
                document.getElementById('busCard').classList.add('active');
                showBusDetail();
            }
        };

        function showCarDetail() {
            if (!lastCalcResult) return;
            const d = lastCalcResult;
            document.getElementById('breakdownTitle').innerText = '🔧 养车成本明细';
            document.getElementById('breakdownContent').innerHTML = `
                <div class="breakdown-item"><span>🔒 保险</span><span>¥ ${d.ins.toFixed(0)}</span></div>
                <div class="breakdown-item"><span>🔧 保养</span><span>¥ ${d.maint.toFixed(0)}</span></div>
                <div class="breakdown-item"><span>📉 折旧 (约)</span><span>¥ ${d.depreciation.toFixed(0)}</span></div>
                <div class="breakdown-item"><span>⛽/⚡ 能耗</span><span>¥ ${d.energyCost.toFixed(0)}</span></div>
                <div class="breakdown-item"><span>🅿️ 停车</span><span>¥ ${d.parkingYear.toFixed(0)}</span></div>
                <div class="breakdown-item"><span>🧹 洗车/罚款/杂项</span><span>¥ ${d.misc.toFixed(0)}</span></div>
                <div class="breakdown-item" style="font-weight:700; border-top:1px solid rgba(255,255,255,0.15); padding-top:8px;"><span style="color:#FFFFFF;">总计</span><span style="background: linear-gradient(135deg, #00D4FF 0%, #7A20FF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">¥ ${d.totalCarCost.toFixed(0)}</span></div>
            `;
        }

        function showTaxiDetail() {
            if (!lastCalcResult) return;
            const d = lastCalcResult;
            const cityName = { first: '一线城市', newFirst: '新一线城市', other: '二三线城市' }[d.cityLevel];
            document.getElementById('breakdownTitle').innerText = '🚕 打车成本明细';
            document.getElementById('breakdownContent').innerHTML = `
                <div class="breakdown-item"><span>📍 城市级别</span><span>${cityName}</span></div>
                <div class="breakdown-item"><span>💵 每公里单价</span><span>¥ ${d.taxiRate.toFixed(1)}</span></div>
                <div class="breakdown-item"><span>📏 年总里程</span><span>${d.totalYearKm.toFixed(0)} 公里</span></div>
                <div class="breakdown-item"><span>📅 日均成本</span><span>¥ ${d.taxiPerDay.toFixed(0)}</span></div>
                <div class="breakdown-item" style="font-weight:700; border-top:1px solid rgba(255,255,255,0.15); padding-top:8px;"><span style="color:#FFFFFF;">年打车费用</span><span style="background: linear-gradient(135deg, #00D4FF 0%, #7A20FF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">¥ ${d.taxiYearCost.toFixed(0)}</span></div>
                <div style="font-size:0.85rem; color:#6B6B8D; margin-top:8px;">* 按里程 × 单价简单估算，实际打车费用会因起步价、等待时长等略高。</div>
            `;
        }

        function showBusDetail() {
            if (!lastCalcResult) return;
            const d = lastCalcResult;
            const cityName = { first: '一线城市', newFirst: '新一线城市', other: '二三线城市' }[d.cityLevel];
            document.getElementById('breakdownTitle').innerText = '🚌 公交/地铁成本明细';
            document.getElementById('breakdownContent').innerHTML = `
                <div class="breakdown-item"><span>📍 城市级别</span><span>${cityName}</span></div>
                <div class="breakdown-item"><span>💳 月均费用</span><span>¥ ${d.transitMonthlyCost}</span></div>
                <div class="breakdown-item"><span>📅 日均成本</span><span>¥ ${d.transitPerDay.toFixed(0)}</span></div>
                <div class="breakdown-item" style="font-weight:700; border-top:1px solid rgba(255,255,255,0.15); padding-top:8px;"><span style="color:#FFFFFF;">年公交/地铁费用</span><span style="background: linear-gradient(135deg, #00D4FF 0%, #7A20FF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">¥ ${d.transitYearCost.toFixed(0)}</span></div>
                <div style="font-size:0.85rem; color:#6B6B8D; margin-top:8px;">* 基于城市平均通勤月费估算，包含日常地铁/公交，不含偶尔打车。</div>
            `;
        }

        window.generateShareText = function() {
            try {
                const car = document.getElementById('carCost').innerText;
                const taxi = document.getElementById('taxiCost').innerText;
                const bus = document.getElementById('busCost').innerText;
                const perDay = document.getElementById('carPerDay').innerText;
                const fuelType = document.getElementById('fuelType').selectedOptions[0].text;
                const text = `🚗 我算了一笔账：开${fuelType}，养车年花${car}，打车要${taxi}，公交只要${bus}。养车每天${perDay}，你呢？来测测你的出行成本 → [你的域名]`;
                document.getElementById('shareText').style.display = 'block';
                document.getElementById('shareText').innerText = text;
                navigator.clipboard.writeText(text).then(() => alert('分享文案已复制，可以粘贴到朋友圈啦'));
            } catch (error) {
                alert('生成分享文案出错：' + error.message);
            }
        };
    })();
</script>
</body>
</html>
