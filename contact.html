<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 罗伯特大毛腿 财务工具箱</title>
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a1f2e;
            --accent-cyan: #00d4ff;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-glow: rgba(0, 212, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0f172a 50%, #1a103c 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 212, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 32px;
            background: linear-gradient(135deg, rgba(26, 31, 46, 0.8) 0%, rgba(17, 24, 39, 0.9) 100%);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-purple), var(--accent-blue), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .header-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: inline-block;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.5));
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .subtitle::before {
            content: '';
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent-cyan);
            box-shadow: 0 0 8px var(--accent-cyan);
        }

        .card {
            background: linear-gradient(145deg, var(--bg-card) 0%, rgba(26, 31, 46, 0.8) 100%);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.3),
                0 2px 8px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 2px;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .card p:last-child {
            margin-bottom: 0;
        }

        .card a {
            color: var(--accent-cyan);
            text-decoration: none;
            transition: color 0.2s;
        }

        .card a:hover {
            color: var(--accent-blue);
            text-decoration: underline;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input,
        .input-group textarea {
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--accent-cyan);
            box-shadow:
                0 0 0 3px rgba(0, 212, 255, 0.1),
                0 0 20px rgba(0, 212, 255, 0.15);
        }

        .input-group input::placeholder,
        .input-group textarea::placeholder {
            color: var(--text-muted);
        }

        .input-group textarea {
            min-height: 140px;
            resize: vertical;
            line-height: 1.6;
        }

        .btn {
            padding: 14px 28px;
            font-weight: 600;
            font-size: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            color: white;
            box-shadow:
                0 4px 20px rgba(59, 130, 246, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow:
                0 8px 30px rgba(59, 130, 246, 0.5),
                0 0 30px rgba(139, 92, 246, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .form-status {
            margin-top: 16px;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            display: none;
        }

        .form-status.success {
            display: block;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(16, 185, 129, 0.05) 100%);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        .form-status.error {
            display: block;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(239, 68, 68, 0.05) 100%);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .divider {
            margin: 32px 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        .footer-nav {
            text-align: center;
            padding: 24px;
            background: linear-gradient(135deg, rgba(26, 31, 46, 0.8) 0%, rgba(17, 24, 39, 0.9) 100%);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .footer-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            margin: 0 16px;
            transition: color 0.2s;
        }

        .footer-nav a:hover {
            color: var(--accent-cyan);
        }

        .footer-nav a.active {
            color: var(--accent-cyan);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            body { padding: 20px 16px; }
            h1 { font-size: 24px; }
            .header { padding: 24px 20px; }
            .card { padding: 20px; }
            .footer-nav a { margin: 8px 10px; display: inline-block; }
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--accent-blue), var(--accent-purple)); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, var(--accent-cyan), var(--accent-blue)); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-icon">✉️</div>
        <h1>联系我们</h1>
        <div class="subtitle">罗伯特大毛腿 财务工具箱</div>
    </div>

    <div class="card">
        <p>如果您有任何问题、建议或反馈，请通过以下方式联系我们：</p>
        <p>邮箱：<a href="mailto:429131907@qq.com">429131907@qq.com</a></p>
        <p>请在邮件中尽量详细地描述您的问题，我们会尽快回复您的消息。</p>
    </div>

    <div class="card">
        <div class="card-title">在线留言</div>
        <form id="contactForm" action="https://formspree.io/f/xpwzgkvl" method="POST">
            <div class="input-group">
                <label>称呼</label>
                <input type="text" name="name" placeholder="您的称呼" required>
            </div>
            <div class="input-group">
                <label>邮箱</label>
                <input type="email" name="email" placeholder="您的邮箱地址" required>
            </div>
            <div class="input-group">
                <label>留言内容</label>
                <textarea name="message" placeholder="请详细描述您的问题或建议..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">📤 发送留言</button>
        </form>
        <div id="formStatus" class="form-status"></div>
    </div>

    <div class="divider"></div>

    <div class="footer-nav">
        <a href="about.html">关于我们</a>
        <a href="contact.html" class="active">联系我们</a>
        <a href="privacy.html">隐私政策</a>
        <a href="disclaimer.html">免责声明</a>
        <div style="margin-top: 16px; color: var(--text-muted); font-size: 12px;">© 2026 罗伯特大毛腿 财务工具箱. All rights reserved.</div>
    </div>
</div>

<script>
    document.getElementById('contactForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const form = this;
        const status = document.getElementById('formStatus');
        const submitBtn = form.querySelector('button[type="submit"]');

        submitBtn.disabled = true;
        submitBtn.textContent = '发送中...';
        status.className = 'form-status';
        status.style.display = 'none';

        try {
            const response = await fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                status.className = 'form-status success';
                status.textContent = '✅ 留言已发送成功，我们会尽快回复您！';
                form.reset();
            } else {
                status.className = 'form-status error';
                status.textContent = '❌ 发送失败，请稍后重试或直接发送邮件至 429131907@qq.com';
            }
        } catch (error) {
            status.className = 'form-status error';
            status.textContent = '❌ 网络错误，请稍后重试或直接发送邮件至 429131907@qq.com';
        }

        status.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = '📤 发送留言';
    });
</script>
</body>
</html>
